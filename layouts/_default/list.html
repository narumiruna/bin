{{ define "main" }}
<section>
  <h1>{{ .Title }}</h1>
  <ul class="post-list">
    {{ range .Pages.ByDate.Reverse }}
    <li>
      <a href="{{ .RelPermalink }}">{{ .Title }}</a>
      <span class="meta">{{ .Date.Format "2006-01-02" }}</span>
    </li>
    {{ else }}
    <li>目前還沒有內容。</li>
    {{ end }}
  </ul>
</section>
{{ end }}
